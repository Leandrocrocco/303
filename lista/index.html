<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>303 · Lista de invitados</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c12;color:#e8e6f0;font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}

.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-t{font-size:16px;font-weight:700;color:#fff;margin-bottom:20px}
.login form{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
.login input{background:#16161f;border:1px solid #26262f;border-radius:12px;padding:13px 14px;color:#fff;font-size:14px}
.login button{background:linear-gradient(120deg,#3ad9a0,#1a9e8a);border:none;border-radius:12px;padding:13px;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.err{color:#e28a8a;font-size:12px;text-align:center;min-height:16px}
.vacio{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#8a8a98;padding:24px;text-align:center}

.form-wrap{max-width:460px;margin:0 auto;padding:22px 20px 60px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.hdr-t{font-size:18px;font-weight:700;color:#fff}
.btn-logout{background:#16161f;border:1px solid #26262f;border-radius:10px;padding:8px 13px;color:#c0b8d0;font-size:12px;cursor:pointer;font-family:inherit}

.aviso{background:#2a2416;border:1px solid #4a3f24;border-radius:12px;padding:16px;font-size:13.5px;color:#e5c98c}

#f-lista{display:flex;flex-direction:column;gap:14px}
#f-lista label{display:flex;flex-direction:column;gap:6px;font-size:11px;color:#8a8a98;text-transform:uppercase;letter-spacing:0.04em;font-weight:700}
#f-lista select,#f-lista input,#f-lista textarea{background:#16161f;border:1px solid #26262f;border-radius:11px;padding:12px 13px;color:#fff;font-size:14px;font-family:inherit}
#f-lista textarea{resize:vertical;line-height:1.6}
.fila{display:flex;gap:12px}
.fila > label{flex:1}
.pin-lbl{flex:0 0 110px !important}
#f-lista button[type=submit]{margin-top:4px;background:linear-gradient(120deg,#3ad9a0,#1a9e8a);border:none;border-radius:13px;padding:14px;color:#fff;font-weight:800;font-size:14px;cursor:pointer}
#f-lista button[type=submit]:disabled{opacity:.5}
.msg{font-size:13px;text-align:center;min-height:18px}
.msg.ok{color:#5dda9a}
.msg.err{color:#e28a8a}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="app.js"></script>
</body>
</html>
